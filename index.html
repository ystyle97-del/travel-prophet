<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>トラベル・プロフェット ～家族旅行Edition～</title>
    <style>
        :root {
            --bg-color: #ebdcb2;
            --text-color: #4a3b2c;
            --gold: #d4af37;
            --border-color: #b8860b;
        }
        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.4) 0%, rgba(0,0,0,0.1) 100%),
                repeating-linear-gradient(45deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 2px, transparent 2px, transparent 4px);
            color: var(--text-color);
            font-family: "Georgia", "Yu Mincho", "Hiragino Mincho ProN", serif;
            margin: 0; padding: 0; line-height: 1.6;
            -webkit-tap-highlight-color: transparent;
        }
        .container {
            max-width: 500px; margin: 0 auto; padding: 20px;
            box-sizing: border-box; min-height: 100vh; display: flex; flex-direction: column;
        }
        h1 {
            text-align: center; font-size: 1.6rem; color: #5c4033;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
            border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-bottom: 20px;
        }
        .setup-form, .step-card {
            background: rgba(255, 255, 255, 0.4); padding: 20px;
            border-radius: 8px; border: 1px solid var(--gold); margin-bottom: 15px;
        }
        .p-input {
            width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--gold);
            border-radius: 4px; background: #fffdf8; font-size: 1rem; box-sizing: border-box;
        }
        .btn {
            width: 100%; padding: 18px; margin-bottom: 15px; font-size: 1.2rem;
            font-weight: bold; border-radius: 8px; border: 2px solid var(--border-color);
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); text-align: center;
        }
        .btn-copper { background: linear-gradient(to bottom, #4f9d92, #3b7a70); color: #fff; }
        .btn-silver { background: linear-gradient(to bottom, #2c3e50, #162230); color: #fff; }
        .btn-gold { background: linear-gradient(to bottom, #2458b3, #113470); color: #ffd700; }
        .btn-point { background: #fdf5e6; border: 1px solid #8b4513; color: #8b4513; padding: 6px 16px; font-weight: bold; border-radius: 20px; cursor: pointer; }
        .btn-undo { background: #95a5a6; color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; border: none; margin-top: 10px; cursor: pointer; }

        .qr-section {
            background: white; padding: 15px; border-radius: 8px; border: 1px solid #ccc;
            text-align: center; margin-top: 20px; font-size: 0.85rem;
        }
        .qr-image { width: 180px; height: 180px; margin: 10px 0; border: 1px solid #eee; object-fit: contain; }

        .tabs { display: flex; overflow-x: auto; margin-bottom: 20px; border-bottom: 2px solid var(--gold); }
        .tab { padding: 10px 15px; background: rgba(255,255,255,0.3); border: 1px solid #ccc; border-bottom: none; border-radius: 8px 8px 0 0; cursor: pointer; white-space: nowrap; flex-shrink: 0; min-width: 80px; text-align: center; }
        .tab.active { background: var(--gold); color: #fff; font-weight: bold; }
        .player-info { text-align: center; margin-bottom: 15px; padding: 15px; background: rgba(255,255,255,0.5); border: 2px solid var(--gold); border-radius: 8px; }
        .score-badge { font-size: 2.2rem; font-weight: bold; color: #8b0000; }
        .particle-coin { position: fixed; width: 24px; height: 24px; background: radial-gradient(circle, #ffe066 0%, #d4af37 100%); border: 2px solid #b8860b; border-radius: 50%; pointer-events: none; z-index: 9999; }
    </style>
</head>
<body>
<div id="app" class="container"></div>

<div id="video-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; justify-content:center; align-items:center; flex-direction:column;">
    <div style="width:90%; max-width:560px;">
        <div style="position:relative; padding-top:56.25%;">
            <iframe id="youtube-iframe" style="position:absolute; top:0; left:0; width:100%; height:100%;" frameborder="0" allowfullscreen></iframe>
        </div>
        <button onclick="closeVideo()" style="width:100%; margin-top:15px; padding:10px; background:#d32f2f; color:white; border:none; font-weight:bold; border-radius:5px; cursor:pointer;">閉じる</button>
    </div>
</div>

<div id="rule-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; justify-content:center; align-items:center; flex-direction:column;">
    <div style="width:90%; max-width:560px; background:#fdf5e6; padding:20px; border-radius:10px;">
        <h3 style="color:#8b4513; margin-top:0;">📜 プロフェット忘れと指摘について</h3>
        <p style="font-size:0.9rem;">予言達成時は「プロフェット！」と宣言。金(5点)、銀(2点)、銅(1点)加点。</p>
        <p style="font-size:0.9rem; border-left:3px solid #d32f2f; padding-left:10px;">宣言忘れを指摘した人に<b>1点</b>が加点されます。</p>
        <button onclick="closeRule()" style="width:100%; padding:12px; background:#5c4033; color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">了解！</button>
    </div>
</div>

<script>
    let state = { phase: 'start', exchangeStep: 1, players: [], currentTab: 0, earlyBirdCounter: 1, history: [] };

    function render() {
        const app = document.getElementById('app');
        if (state.phase === 'start') app.innerHTML = getStartHTML();
        else if (state.phase === 'exchange') app.innerHTML = getExchangeHTML();
        else if (state.phase === 'main') app.innerHTML = getMainHTML();
        window.scrollTo(0,0);
    }

    function getStartHTML() {
        return `
            <h1>トラベル・プロフェット</h1>
            <div style="text-align:center; margin-bottom:20px;">
                <button onclick="openVideo()" style="background:#5c4033; color:#f4e4bc; border:1px solid var(--border-color); padding:8px 15px; border-radius:20px; font-weight:bold; cursor:pointer;">📖 動画でルールを見る</button>
            </div>
            <div class="setup-form">
                <h3>プレイヤー登録 <small style="font-size:0.8rem;">(5人まで)</small></h3>
                <div id="player-inputs">
                    <input type="text" class="p-input" value="プレイヤー1">
                    <input type="text" class="p-input" value="プレイヤー2">
                </div>
                <button id="add-player-btn" onclick="addInput()" class="btn-point" style="width:100%;">＋ プレイヤー追加</button>
            </div>
            
            <div class="qr-section">
                <p><b>【重要】</b><br>プレイヤー登録および点数計算は代表者一人のアプリで行って下さい。</p>
                <p>それ以外のプレイヤーは以下のQRコードからマニュアル専用アプリに移動して下さい。</p>
                <img src="qr-code.png" class="qr-image" alt="マニュアルQRコード">
                <p style="font-size:0.75rem; color:#666;">（スマホで読み取ってマニュアルを確認できます）</p>
            </div>

            <button onclick="startExchange()" class="btn" style="background:#5c4033; color:#fff; margin-top:20px;">次へ（交換フェイズ開始）</button>
        `;
    }

    function getExchangeHTML() {
        let content = '';
        if (state.exchangeStep === 1) {
            content = `<h3>① 予言の浄化</h3><p>不要なカードを伏せて捨てます。1枚も捨てなくてもOK。</p><button onclick="state.exchangeStep=2; render();" class="btn btn-copper">次へ</button>`;
        } else if (state.exchangeStep === 2) {
            content = `<h3>② 苦難の回収</h3><p>他人の捨て札を回収（金1、銀2、銅3まで）。<br><b>回収1枚ごとに1点加点！</b></p>
                ${state.players.map((p, i) => `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; padding:10px; background:white; border-radius:5px;"><span><b>${p.name}</b>: ${p.score}pt</span><button class="btn-point" onclick="addExPoint(${i})">+1点</button></div>`).join('')}
                <button onclick="state.exchangeStep=3; render();" class="btn btn-copper">次へ</button>`;
        } else if (state.exchangeStep === 3) {
            content = `<h3>③ 6枚への復帰</h3><p>手札を金1、銀2、銅3（計6枚）に調整します。</p><button onclick="startMain()" class="btn btn-gold">冒険開始！</button>`;
        }
        return `<h1>交換フェイズ</h1><div class="step-card">${content}</div>`;
    }

    function getMainHTML() {
        const player = state.players[state.currentTab];
        return `
            <h1>トラベル・プロフェット</h1>
            <div class="tabs">${state.players.map((p, i) => `<div class="tab ${i === state.currentTab ? 'active' : ''}" onclick="switchTab(${i})">${p.name}<br>${p.score}pt</div>`).join('')}</div>
            <div class="player-info"><h2>${player.name}</h2><div class="score-badge">${player.score} pt</div><button class="btn-undo" onclick="undo()">↩ 戻る</button></div>
            <button onclick="openRule()" style="width:100%; background:#fdf5e6; border:1px solid #8b4513; color:#8b4513; margin-bottom:10px; padding:12px; border-radius:8px; font-weight:bold;">📜 ルール確認</button>
            <button class="btn btn-copper" onclick="handleProphet('copper', this)">銅 達成(+1)</button>
            <button class="btn btn-silver" onclick="handleProphet('silver', this)">銀 達成(+2)</button>
            <button class="btn btn-gold" onclick="handleProphet('gold', this)">金 達成(+5)</button>
            <button class="btn-point" style="width:100%; padding:15px;" onclick="manualAdd(1)">💡 指摘ボーナス(+1)</button>
            <div style="text-align:center; margin-top:30px;"><button onclick="resetGame()" style="color:#999; font-size:0.8rem; background:none; border:none;">リセット</button></div>
        `;
    }

    function addInput() {
        const div = document.getElementById('player-inputs');
        if (div && div.children.length < 5) {
            const input = document.createElement('input');
            input.type = 'text'; input.className = 'p-input';
            input.value = 'プレイヤー' + (div.children.length + 1);
            div.appendChild(input);
            if (div.children.length === 5) document.getElementById('add-player-btn').style.display = 'none';
        }
    }

    function startExchange() {
        const inputs = document.querySelectorAll('.p-input');
        state.players = Array.from(inputs).map(i => ({ name: i.value, score: 0, copper: 0, silver: 0, gold: 0, earlyBird: null }));
        state.phase = 'exchange';
        render();
    }

    function addExPoint(i) { saveHistory(); state.players[i].score += 1; render(); }
    function startMain() { state.phase = 'main'; state.history = []; render(); }
    function saveHistory() { state.history.push(JSON.stringify({ players: state.players.map(p => ({...p})), earlyBirdCounter: state.earlyBirdCounter })); if (state.history.length > 10) state.history.shift(); }
    function undo() { if (state.history.length > 0) { const last = JSON.parse(state.history.pop()); state.players = last.players; state.earlyBirdCounter = last.earlyBirdCounter; render(); } }
    function switchTab(i) { state.currentTab = i; render(); }
    function manualAdd(pts) { saveHistory(); state.players[state.currentTab].score += pts; render(); }
    function handleProphet(type, el) {
        saveHistory();
        const p = state.players[state.currentTab];
        let pts = type === 'gold' ? 5 : (type === 'silver' ? 2 : 1);
        p.score += pts;
        if (type === 'copper') p.copper++;
        if (type === 'silver') p.silver++;
        createParticle(el.getBoundingClientRect());
        if (!p.earlyBird && (p.copper + p.silver) >= 4) {
            p.earlyBird = state.earlyBirdCounter++;
            const bonus = Math.max(0, state.players.length - p.earlyBird + 1);
            p.score += bonus;
            alert(p.name + "さん、早上がりボーナス +" + bonus + "点！");
        }
        render();
    }
    function createParticle(rect) {
        for(let i=0; i<10; i++) {
            const c = document.createElement('div');
            c.className = 'particle-coin';
            c.style.left = (rect.left + rect.width/2) + 'px';
            c.style.top = (rect.top + rect.height/2) + 'px';
            document.body.appendChild(c);
            const a = Math.random() * Math.PI * 2;
            const v = 50 + Math.random() * 50;
            c.animate([{ opacity: 1 }, { transform: `translate(${Math.cos(a)*v}px, ${Math.sin(a)*v - 100}px)`, opacity: 0 }], { duration: 800 }).onfinish = () => c.remove();
        }
    }
    function openVideo() { document.getElementById('video-modal').style.display = 'flex'; document.getElementById('youtube-iframe').src = "https://www.youtube.com/embed/LDW3Ekt8Kr0?rel=0&autoplay=1"; }
    function closeVideo() { document.getElementById('video-modal').style.display = 'none'; document.getElementById('youtube-iframe').src = ""; }
    function openRule() { document.getElementById('rule-modal').style.display = 'flex'; }
    function closeRule() { document.getElementById('rule-modal').style.display = 'none'; }
    function resetGame() { if (confirm("リセットしますか？")) location.reload(); }
    render();
</script>
</body>
</html>
